title: "Protein AI Platform — Complete Demo"
base_url: "http://localhost:8050"  # Override at runtime with: --base-url https://your-host:port
resolution: [1920, 1080]
pause_between_steps: 2.5
voice: "af_heart"

steps:
  # ─── INTRO: Projects ───────────────────────────────────────────
  - action: navigate
    url: /dashboard/projects
    narration: "Welcome to the Protein AI Platform. Every analysis lives inside a project. Two projects are active: the default workspace and the MtrA supramolecular assembly study."
    wait_for: "body"
    duration_override: 5.0

  # ─── STABILITY: Live Prediction ─────────────────────────────────
  - action: navigate
    url: /dashboard/stability/predict
    narration: "The stability module predicts thermostability, solubility, and physicochemical properties from sequence alone."
    wait_for: "body"
    duration_override: 4.0

  - action: type
    selector: "#sequence"
    text: ""
    narration: "Paste a three-hundred-residue enzyme sequence."
    highlight: "#sequence"
    duration_override: 3.0

  - action: click
    selector: "button[type='submit']"
    narration: "Hit Predict. Results appear instantly, no GPU needed."
    highlight: "button[type='submit']"
    duration_override: 2.5

  - action: wait
    wait_seconds: 2.0
    narration: "Melting temperature, solubility, instability index, isoelectric point, hydropathicity, and aromaticity."

  - action: screenshot
    narration: "The protein is classified as stable with a melting temperature above sixty degrees."
    duration_override: 3.5

  # ─── REDOX: Completed Jobs ──────────────────────────────────────
  - action: navigate
    url: /dashboard/redox/jobs
    narration: "The redox tuning module engineers electron-transfer proteins. Two completed scans show forty-four mutations each."
    wait_for: "body"
    duration_override: 4.5

  - action: click
    selector: "a[href*='redox/jobs/']"
    narration: "Inside a scan: heme detection, mutation generation, fitness filtering, structure prediction, electrostatics, and variant ranking."
    highlight: "a[href*='redox/jobs/']"
    duration_override: 4.0

  - action: wait
    wait_seconds: 1.5
    narration: "Every variant ranked by predicted redox potential shift in millivolts."

  - action: scroll
    distance: 400
    narration: "The full mutation table. Conservative strategy targeting residues near the heme cofactor."
    duration_override: 3.5

  - action: navigate
    url: /dashboard/redox/new
    narration: "Starting a new scan: upload a PDB, set the target potential, choose a mutation strategy and structure method."
    wait_for: "body"
    duration_override: 4.0

  # ─── DOCKING: Screening Form ────────────────────────────────────
  - action: navigate
    url: /dashboard/docking/jobs
    narration: "Molecular docking screens small molecules against protein targets. AutoDock Vina for speed, Gnina for deep-learning scoring."
    wait_for: "body"
    duration_override: 4.0

  - action: navigate
    url: /dashboard/docking/screen
    narration: "The virtual screening form. Select a protein, upload a compound library, configure the search box."
    wait_for: "body"
    duration_override: 4.0

  # ─── ADMET: Drug Properties ─────────────────────────────────────
  - action: navigate
    url: /dashboard/admet/predict
    narration: "ADMET prediction. Enter SMILES strings to assess absorption, distribution, metabolism, excretion, and toxicity."
    wait_for: "body"
    duration_override: 4.0

  - action: type
    selector: "textarea"
    text: "CCO\nCC(=O)Oc1ccccc1C(=O)O\nc1ccccc1"
    narration: "Three compounds: ethanol, aspirin, and benzene. Batch screening in seconds."
    duration_override: 3.5

  - action: screenshot
    narration: "Results flag drug-likeness violations using Lipinski, QED, and Veber rules."
    duration_override: 3.0

  # ─── PROTEIN DESIGN: Jobs & Gallery ─────────────────────────────
  - action: navigate
    url: /dashboard/protein/jobs
    narration: "Structure prediction across eight models: AlphaFold, ESMFold, Boltz-2, Chai-1, AlphaFold3, and more."
    wait_for: "body"
    duration_override: 4.0

  - action: navigate
    url: /dashboard/protein/gallery
    narration: "The structure gallery shows completed predictions as interactive 3D cards with confidence color-coding."
    wait_for: "body"
    duration_override: 3.5

  # ─── COMPARISON ─────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/protein/compare
    narration: "Compare variants side by side with 3D structure overlays and mutation diff tables."
    wait_for: "body"
    duration_override: 3.0

  # ─── MSA ────────────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/msa/new
    narration: "Generate multiple sequence alignments from ColabFold or UniRef databases to boost prediction accuracy."
    wait_for: "body"
    duration_override: 3.0

  # ─── ProteinMPNN ────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/proteinmpnn/new
    narration: "Inverse folding with ProteinMPNN. Design new sequences for an existing backbone structure."
    wait_for: "body"
    duration_override: 3.0

  # ─── PP Docking ─────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/ppdock/new
    narration: "Protein-protein docking predicts how two proteins interact using LightDock or HDOCK."
    wait_for: "body"
    duration_override: 3.0

  # ─── PIPELINE ───────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/pipeline/list
    narration: "Automated pipelines chain multiple steps. Fold, dock, and score in sequence."
    wait_for: "body"
    duration_override: 3.5

  - action: navigate
    url: /dashboard/pipeline/new
    narration: "The pipeline wizard. Select steps, configure parameters, and submit. Progress is tracked per stage."
    wait_for: "body"
    duration_override: 3.5

  # ─── EVALUATION ─────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/evaluation/overview
    narration: "Evaluation integrates MLflow for experiment tracking. Compare accuracy, diversity, and structural quality."
    wait_for: "body"
    duration_override: 3.5

  # ─── COPILOT ────────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/protein/jobs
    narration: "The AI Copilot is always available. One hundred and forty tools through natural language. Predict, dock, score, all from a chat window."
    wait_for: "body"
    duration_override: 5.0

  # ─── CLOSING ────────────────────────────────────────────────────
  - action: navigate
    url: /dashboard/projects
    narration: "From sequence to drug candidate. The Protein AI Platform. Self-hosted, open, and ready for your next discovery."
    wait_for: "body"
    duration_override: 6.0
