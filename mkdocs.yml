site_name: demo-video-maker
site_description: Automated webapp demo video recorder
repo_url: ""
theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - CLI Reference: guide/cli.md
    - Scenario Format: guide/scenarios.md
    - TTS Backends: guide/tts.md
    - MCP Server: guide/mcp-server.md
  - API Reference:
    - Models: api/models.md
    - Recorder: api/recorder.md
    - Narrator: api/narrator.md
    - Stitcher: api/stitcher.md
    - MCP Server: api/mcp-server.md
    - Subtitles: api/subtitles.md
    - Cursor: api/cursor.md
    - GIF: api/gif.md
    - Tutorial: api/tutorial.md
  - Architecture:
    - Overview: architecture/overview.md
    - Pipeline: architecture/pipeline.md
  - License: license.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
